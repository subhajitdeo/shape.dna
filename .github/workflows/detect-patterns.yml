name: Detect Chart Patterns

on:
  push:
  schedule:
    - cron: '45 10 * * *'

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install numpy scipy pandas

      - name: Prepare data files (.NS.json -> .json)
        run: |
          mkdir -p data
          # Find all .NS.json files anywhere in the repo
          find . -type f -name "*.NS.json" | while read -r file; do
            # Extract base name without .NS.json
            base=$(basename "$file" .NS.json)
            # Create a symbolic link inside data/ as base.json
            ln -sf "$(realpath --relative-to=data "$file")" "data/${base}.json"
          done
          echo "Linked .NS.json files to data/*.json:"
          ls -la data/

      - name: Run pattern detection
        run: python detect_patterns.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shape.dna/
          git diff --cached --quiet || (git commit -m "Auto-update patterns [skip ci]" && git push)
