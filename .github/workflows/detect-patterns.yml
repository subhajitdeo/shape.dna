name: Detect Chart Patterns

on:
  push:
    branches: [ main ]          # limit to main branch to avoid noise
  schedule:
    - cron: '45 10 * * *'
  workflow_dispatch:            # allow manual trigger

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'          # cache pip dependencies

      - name: Install dependencies
        run: pip install numpy scipy pandas

      - name: Run pattern detection
        id: detect
        run: python detect_patterns.py
        continue-on-error: false   # fail immediately if script errors

      - name: Ensure output directory exists
        run: mkdir -p shape.dna

      - name: Commit and push results
        if: success()               # only if detection succeeded
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shape.dna/
          git diff --cached --quiet || (git commit -m "Auto-update patterns [skip ci]" && git push)
