name: Update Stock Data

on:
  schedule:
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install yfinance pandas

      - name: Fetch stock data
        run: python fetch_stock_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the new/updated data files
          git add data/
          
          # Stash any local changes (including untracked files) so we can pull cleanly
          git stash --include-untracked || true
          
          # Pull remote changes with rebase
          git pull --rebase origin main
          
          # Restore our stashed data files
          git stash pop || true
          
          # Stage again (in case stash pop unstaged them)
          git add data/
          
          # Commit only if there are actual changes
          git diff --cached --quiet || git commit -m "Auto-update stock data [skip ci]"
          
          # Push to remote
          git push origin main
