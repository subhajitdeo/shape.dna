<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shape.DNA – Active Pattern Watchlist</title>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Optional: Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
            color: #1f2937;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub {
            color: #4b5563;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .patterns-panel {
            flex: 1.2;
            min-width: 320px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .chart-panel {
            flex: 2;
            min-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 16px;
        }
        .panel-header {
            padding: 16px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .filters {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .filter-group label {
            font-size: 0.85rem;
            font-weight: 500;
        }
        select, input {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.85rem;
        }
        .pattern-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .pattern-table th, .pattern-table td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .pattern-table th {
            background: #f1f5f9;
            position: sticky;
            top: 0;
            font-weight: 600;
        }
        .pattern-table tr:hover {
            background: #fef9c3;
            cursor: pointer;
        }
        .pattern-table tr.active-row {
            background: #dbeafe;
            border-left: 3px solid #2563eb;
        }
        .badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .confidence-high {
            background: #22c55e20;
            color: #15803d;
            font-weight: bold;
        }
        .urgency-high {
            background: #f9731620;
            color: #c2410c;
        }
        .chart-container {
            width: 100%;
            height: 450px;
            margin-bottom: 16px;
        }
        .pattern-detail {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.85rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
            gap: 8px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #cbd5e1;
            padding: 4px 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        @media (max-width: 900px) {
            .dashboard { flex-direction: column; }
            .chart-panel { min-width: auto; }
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chart-line" style="color:#3b82f6"></i> Shape.DNA · Active Long Patterns</h1>
    <div class="sub">Daily bullish setups only (active, not yet broken out) — filtered by confidence & urgency</div>

    <div class="dashboard">
        <!-- Left panel: pattern list -->
        <div class="patterns-panel">
            <div class="panel-header">
                <i class="fas fa-list-ul"></i> Watchlist
                <span id="patternCount" style="float:right; font-size:0.8rem;"></span>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label>Min Confidence:</label>
                    <input type="number" id="minConfidence" value="70" step="5" min="0" max="100" style="width:70px">
                </div>
                <div class="filter-group">
                    <label>Min Urgency:</label>
                    <input type="number" id="minUrgency" value="50" step="5" min="0" max="100" style="width:70px">
                </div>
                <button id="applyFilters"><i class="fas fa-filter"></i> Apply</button>
                <button id="resetFilters"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>
            <div style="overflow-x: auto; max-height: 600px;">
                <table class="pattern-table" id="patternTable">
                    <thead>
                        <tr><th>Symbol</th><th>Pattern</th><th>Conf</th><th>Urgency</th><th>Breakout</th><th>Days to Apex</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="loading">Loading patterns...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right panel: chart & details -->
        <div class="chart-panel">
            <div class="panel-header">
                <i class="fas fa-chart-simple"></i> Pattern Chart
                <span id="selectedSymbol" style="font-size:0.8rem; font-weight:normal; margin-left:12px;"></span>
            </div>
            <div id="chartContainer" class="chart-container"></div>
            <div id="patternDetails" class="pattern-detail">Select a stock to view pattern overlay</div>
        </div>
    </div>
</div>

<script>
    // ----- Configuration -----
    const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/subhajitdeo/shape.dna/main/';
    const PATTERNS_URL = GITHUB_RAW_BASE + 'shape.dna/active_patterns.json';

    let allPatterns = [];           // raw patterns array from JSON
    let filteredPatterns = [];      // after filters
    let currentChart = null;
    let currentSeries = null;
    let currentPatternData = null;   // pattern object for selected stock

    // DOM elements
    const tbody = document.getElementById('tableBody');
    const minConfInput = document.getElementById('minConfidence');
    const minUrgInput = document.getElementById('minUrgency');
    const applyBtn = document.getElementById('applyFilters');
    const resetBtn = document.getElementById('resetFilters');
    const patternCountSpan = document.getElementById('patternCount');
    const selectedSymbolSpan = document.getElementById('selectedSymbol');
    const patternDetailsDiv = document.getElementById('patternDetails');

    // ----- Helper: fetch JSON -----
    async function fetchJSON(url) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return await resp.json();
        } catch (err) {
            console.error('Fetch error:', url, err);
            return null;
        }
    }

    // ----- Load patterns from repo -----
    async function loadPatterns() {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading patterns from GitHub...</td></tr>';
        const data = await fetchJSON(PATTERNS_URL);
        if (!data || !data.patterns) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">❌ No active patterns found. Run detect_patterns.py first.</td></tr>';
            return false;
        }
        allPatterns = data.patterns;
        // sort by urgency desc
        allPatterns.sort((a,b) => b.urgency_score - a.urgency_score);
        applyFiltersAndRender();
        return true;
    }

    // ----- Filter & render table -----
    function applyFiltersAndRender() {
        const minConf = parseFloat(minConfInput.value) || 0;
        const minUrg = parseFloat(minUrgInput.value) || 0;
        filteredPatterns = allPatterns.filter(p => p.confidence >= minConf && p.urgency_score >= minUrg);
        patternCountSpan.innerText = `${filteredPatterns.length} / ${allPatterns.length}`;
        renderTable();
        // if there is at least one, auto-select first
        if (filteredPatterns.length > 0) {
            const firstSymbol = filteredPatterns[0].symbol;
            selectStock(firstSymbol);
        } else {
            selectedSymbolSpan.innerText = '';
            patternDetailsDiv.innerHTML = 'No patterns match the filters. Adjust thresholds.';
            if (currentChart) {
                currentChart.remove();
                currentChart = null;
            }
        }
    }

    function renderTable() {
        if (!filteredPatterns.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">⚠️ No patterns with current filters</td></tr>';
            return;
        }
        let html = '';
        for (let p of filteredPatterns) {
            const days = p.days_to_apex !== null ? p.days_to_apex : '—';
            html += `<tr data-symbol="${p.symbol}">
                        <td><strong>${p.symbol}</strong></td>
                        <td><span class="badge">${p.pattern.replace(/_/g,' ')}</span></td>
                        <td class="confidence-high">${p.confidence}%</td>
                        <td class="urgency-high">${p.urgency_score}</td>
                        <td>${p.breakout_level}</td>
                        <td>${days}</td>
                     </tr>`;
        }
        tbody.innerHTML = html;
        // attach click handlers
        document.querySelectorAll('#patternTable tbody tr').forEach(row => {
            row.addEventListener('click', () => {
                const sym = row.getAttribute('data-symbol');
                selectStock(sym);
                // highlight active row
                document.querySelectorAll('#patternTable tbody tr').forEach(r => r.classList.remove('active-row'));
                row.classList.add('active-row');
            });
        });
    }

    // ----- Load stock data & render chart with overlay -----
    async function selectStock(symbol) {
        selectedSymbolSpan.innerText = symbol;
        patternDetailsDiv.innerHTML = 'Loading chart data...';
        // find pattern object
        const pattern = filteredPatterns.find(p => p.symbol === symbol);
        if (!pattern) return;
        currentPatternData = pattern;

        // fetch historical data
        const dataUrl = GITHUB_RAW_BASE + `data/${symbol}.json`;
        const stockData = await fetchJSON(dataUrl);
        if (!stockData || !stockData.length) {
            patternDetailsDiv.innerHTML = `❌ Could not load data for ${symbol}. Make sure data/${symbol}.json exists.`;
            return;
        }

        // Prepare OHLC for Lightweight Charts (candlestick)
        const chartData = stockData.map(d => ({
            time: d.time,          // expects YYYY-MM-DD
            open: d.open,
            high: d.high,
            low: d.low,
            close: d.close
        })).slice(-90); // last 90 days for clarity

        // Create or reset chart
        if (currentChart) {
            currentChart.remove();
        }
        const chartContainer = document.getElementById('chartContainer');
        currentChart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 450,
            layout: { background: { color: '#ffffff' }, textColor: '#333' },
            grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        currentSeries = currentChart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
            wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });
        currentSeries.setData(chartData);

        // Add overlays based on pattern type
        addPatternOverlay(currentChart, pattern, chartData);

        // Resize listener
        window.addEventListener('resize', () => {
            if (currentChart) {
                currentChart.applyOptions({ width: chartContainer.clientWidth });
            }
        });

        // Show pattern details
        displayPatternDetails(pattern);
    }

    function addPatternOverlay(chart, pattern, chartData) {
        if (!chart) return;
        const currentPrice = pattern.current_price;
        const breakoutLevel = pattern.breakout_level;
        const target = pattern.target;
        const stopLoss = pattern.stop_loss;

        // Horizontal line for breakout level (resistance / neckline)
        const breakoutLine = {
            price: breakoutLevel,
            color: '#f97316',
            lineWidth: 2,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: 'Breakout Level'
        };
        currentSeries.createPriceLine(breakoutLine);

        // Target line (green)
        if (target) {
            currentSeries.createPriceLine({
                price: target,
                color: '#22c55e',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted,
                title: 'Target'
            });
        }
        // Stop loss line (red)
        if (stopLoss) {
            currentSeries.createPriceLine({
                price: stopLoss,
                color: '#ef4444',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dotted,
                title: 'Stop Loss'
            });
        }

        // For triangles: add trendlines (support & resistance)
        if (pattern.pattern.includes('triangle')) {
            // We need to draw lines using line series because price lines are only horizontal.
            // Use a LineSeries for the two sloping lines.
            // Determine coordinates: we will draw from the start of the pattern window to the apex.
            // Since we don't have exact x coordinates from detection, we approximate using the slopes and intercepts.
            // For simplicity, we draw from the earliest visible bar to the breakout level point.
            // A more accurate method would require storing line coordinates in JSON.
            // We'll use a simplified visual: draw a line from the last 20 bars low/high to the breakout point.
            // Alternatively, we can create two line series with two points each.
            if (pattern.support_slope !== undefined && pattern.resistance_level) {
                // ascending triangle: flat resistance, rising support
                const dates = chartData.map(d => d.time);
                const lastDate = dates[dates.length-1];
                // calculate approximate support value at first visible bar (index -60)
                const firstIndex = Math.max(0, chartData.length - 60);
                const firstDate = chartData[firstIndex].time;
                // support value at firstDate (using slope and intercept)
                // We need original intercept from detection – not stored fully, so we approximate based on current support and slope
                // Instead we add a simple note in details. For a clean solution, we would store line endpoints in JSON.
                // For now, we add a text annotation.
                const supportLineSeries = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'Support' });
                const resistanceLineSeries = chart.addLineSeries({ color: '#f97316', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'Resistance' });
                // Simplified: use two points: current price and breakout level for resistance, and current low and support level extrapolated
                const supportValue = pattern.stop_loss; // approximate
                supportLineSeries.setData([
                    { time: chartData[Math.max(0,chartData.length-30)].time, value: supportValue },
                    { time: lastDate, value: pattern.current_price * 0.99 }
                ]);
                resistanceLineSeries.setData([
                    { time: chartData[Math.max(0,chartData.length-30)].time, value: breakoutLevel },
                    { time: lastDate, value: breakoutLevel }
                ]);
            }
        }
        else if (pattern.pattern === 'rectangle') {
            // draw horizontal support and resistance
            if (pattern.support && pattern.resistance) {
                currentSeries.createPriceLine({ price: pattern.support, color: '#6b7280', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'Support' });
                currentSeries.createPriceLine({ price: pattern.resistance, color: '#f97316', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'Resistance' });
            }
        }
        else if (pattern.pattern === 'w_pattern_double_bottom') {
            // mark neckline already added as breakout, optionally mark the two bottoms (use markers)
            const markers = [];
            if (pattern.bottom1) markers.push({ time: chartData[chartData.length-30]?.time, position: 'below', color: '#22c55e', shape: 'arrowDown', text: `Bottom ${pattern.bottom1}` });
            if (pattern.bottom2) markers.push({ time: chartData[chartData.length-10]?.time, position: 'below', color: '#22c55e', shape: 'arrowDown', text: `Bottom ${pattern.bottom2}` });
            if (markers.length) currentSeries.setMarkers(markers);
        }
    }

    function displayPatternDetails(pattern) {
        let html = `
            <div class="detail-item"><strong>Pattern:</strong> ${pattern.pattern.replace(/_/g,' ')}</div>
            <div class="detail-item"><strong>Confidence:</strong> ${pattern.confidence}%</div>
            <div class="detail-item"><strong>Urgency Score:</strong> ${pattern.urgency_score}</div>
            <div class="detail-item"><strong>Breakout Level:</strong> ${pattern.breakout_level}</div>
            <div class="detail-item"><strong>Current Price:</strong> ${pattern.current_price}</div>
            <div class="detail-item"><strong>Distance to Breakout:</strong> ${pattern.distance_to_breakout_pct}%</div>
            <div class="detail-item"><strong>Target:</strong> ${pattern.target || '—'}</div>
            <div class="detail-item"><strong>Stop Loss:</strong> ${pattern.stop_loss || '—'}</div>
        `;
        if (pattern.days_to_apex !== null && pattern.days_to_apex !== undefined) {
            html += `<div class="detail-item"><strong>Days to Apex:</strong> ${pattern.days_to_apex}</div>`;
        }
        patternDetailsDiv.innerHTML = html;
    }

    // ----- Initialization -----
    window.addEventListener('load', async () => {
        await loadPatterns();
        applyBtn.addEventListener('click', () => applyFiltersAndRender());
        resetBtn.addEventListener('click', () => {
            minConfInput.value = '70';
            minUrgInput.value = '50';
            applyFiltersAndRender();
        });
    });
</script>
</body>
</html>
